name: Smoke Test (deploy + Supabase)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      APP_URL: https://lidertraining.vercel.app
      SUPABASE_URL: https://xpnnzjmyuforwsccvkta.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhwbm56am15dWZvcndzY2N2a3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjAwODAsImV4cCI6MjA5MTgzNjA4MH0.HzqBe9tOi0bVRy0IMfPz0SVMiqfjZgxUvjEnZVBTPKw

    steps:
      - name: Aguardar propagação
        run: sleep 20

      # ---------- APP ----------
      - name: "🌐 App / root — status + body preview"
        continue-on-error: true
        run: |
          echo "GET $APP_URL/"
          CODE=$(curl -sL -o /tmp/root.html -w "%{http_code}" "$APP_URL/")
          SIZE=$(wc -c < /tmp/root.html)
          echo "HTTP: $CODE  |  size: $SIZE bytes"
          echo "---- primeiros 500 bytes ----"
          head -c 500 /tmp/root.html
          echo ""
          echo "---- busca elementos do app ----"
          grep -q 'id="root"' /tmp/root.html && echo "  ✓ tem <div id=root>" || echo "  ✗ NÃO tem <div id=root>"
          grep -q 'LiderTraining' /tmp/root.html && echo "  ✓ título" || echo "  ✗ sem 'LiderTraining'"
          grep -q '/assets/' /tmp/root.html && echo "  ✓ assets hasheados" || echo "  ✗ sem /assets/"
          grep -q 'NOT_FOUND\|DEPLOYMENT_NOT_FOUND\|404' /tmp/root.html && echo "  ⚠️ Vercel 404" || true

      - name: "🌐 App / login"
        continue-on-error: true
        run: |
          CODE=$(curl -sL -o /tmp/login.html -w "%{http_code}" "$APP_URL/login")
          echo "HTTP: $CODE"
          head -c 300 /tmp/login.html
          echo ""

      - name: "🌐 App / signup/DEMO2026"
        continue-on-error: true
        run: |
          CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$APP_URL/signup/DEMO2026")
          echo "HTTP: $CODE"

      - name: "🌐 App / assets (primeiro JS)"
        continue-on-error: true
        run: |
          # Pega o primeiro arquivo /assets/ referenciado no HTML
          ASSET=$(grep -oP '/assets/[a-zA-Z0-9._-]+\.js' /tmp/root.html | head -1)
          if [ -n "$ASSET" ]; then
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$APP_URL$ASSET")
            echo "$ASSET → HTTP $CODE"
          else
            echo "Nenhum asset encontrado no HTML"
          fi

      # ---------- SUPABASE ----------
      - name: "📦 Supabase / REST ping"
        continue-on-error: true
        run: |
          CODE=$(curl -sL -o /tmp/ping.json -w "%{http_code}" -H "apikey: $SUPABASE_ANON_KEY" "$SUPABASE_URL/rest/v1/")
          echo "HTTP: $CODE"
          head -c 300 /tmp/ping.json
          echo ""

      - name: "📦 Supabase / journey_steps"
        continue-on-error: true
        run: |
          BODY=$(curl -sL -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/journey_steps?select=id,name")
          echo "Resposta bruta:"
          echo "$BODY" | head -c 800
          echo ""
          # Se for array, conta. Se for erro, mostra.
          if echo "$BODY" | jq 'type' 2>/dev/null | grep -q array; then
            COUNT=$(echo "$BODY" | jq length)
            echo "Linhas: $COUNT (esperado: 11)"
          fi

      - name: "📦 Supabase / audios"
        continue-on-error: true
        run: |
          BODY=$(curl -sL -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/audios?select=id,title")
          echo "$BODY" | head -c 600
          echo ""
          if echo "$BODY" | jq 'type' 2>/dev/null | grep -q array; then
            COUNT=$(echo "$BODY" | jq length)
            echo "Linhas: $COUNT (esperado: 8)"
          fi

      - name: "📦 Supabase / invite DEMO2026"
        continue-on-error: true
        run: |
          BODY=$(curl -sL -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/invite_codes?select=code&code=eq.DEMO2026")
          echo "$BODY"

      - name: "📦 Supabase / RPC is_ancestor_of"
        continue-on-error: true
        run: |
          BODY=$(curl -sL -X POST \
            -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"ancestor":"00000000-0000-0000-0000-000000000000","descendant":"00000000-0000-0000-0000-000000000000"}' \
            "$SUPABASE_URL/rest/v1/rpc/is_ancestor_of")
          echo "Resposta: $BODY"

      - name: "🔐 Auth / settings"
        continue-on-error: true
        run: |
          curl -sL -H "apikey: $SUPABASE_ANON_KEY" "$SUPABASE_URL/auth/v1/settings" | head -c 500
          echo ""
