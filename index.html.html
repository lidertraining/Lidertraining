<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:#0e0e10;color:#e5e1e4;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100dvh}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:20px;vertical-align:middle}
.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.serif{font-family:'Playfair Display',serif}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#4d4353;border-radius:9px}
.no-scroll::-webkit-scrollbar{display:none}
.no-scroll{scrollbar-width:none}

/* Glass & Surfaces */
.glass{backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(32,31,33,.88)}
.glass-lite{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(42,42,44,.6)}
.surface{background:#2a2a2c;border-radius:16px}
.surface-sm{background:#2a2a2c;border-radius:12px}

/* Gradient helpers */
.gp{background:linear-gradient(135deg,#edb1ff 0%,#6e218d 100%)}
.gp-h{background:linear-gradient(160deg,#c9a0ff 0%,#6e218d 60%,#520070 100%)}
.gg{background:linear-gradient(135deg,#ffd700,#b8860b)}
.ge{background:linear-gradient(135deg,#50c878,#2e8b57)}
.gr{background:linear-gradient(135deg,#e0115f,#9c1340)}

/* Glow & Shadow */
.glow-am{box-shadow:0 0 40px rgba(237,177,255,.1),0 0 80px rgba(110,33,141,.06)}
.glow-gd{box-shadow:0 0 30px rgba(255,215,0,.12)}
.amb-sh{box-shadow:0 20px 50px rgba(0,0,0,.5)}
.soft-sh{box-shadow:0 8px 24px rgba(0,0,0,.25)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 12px rgba(237,177,255,.08)}50%{box-shadow:0 0 28px rgba(237,177,255,.22)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(-40px) rotate(360deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.an{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) forwards}
.an-f{animation:fadeIn .4s ease forwards}
.an-s{animation:slideR .4s ease forwards}
.d0{animation-delay:0s}.d1{animation-delay:.06s;opacity:0}.d2{animation-delay:.12s;opacity:0}.d3{animation-delay:.18s;opacity:0}.d4{animation-delay:.24s;opacity:0}.d5{animation-delay:.3s;opacity:0}.d6{animation-delay:.36s;opacity:0}
.glow-p{animation:glow-pulse 2.5s ease-in-out infinite}
.float{animation:float 3s ease-in-out infinite}

/* Interactive */
.tap{transition:all .2s cubic-bezier(.4,0,.2,1);cursor:pointer;-webkit-user-select:none;user-select:none}
.tap:active{transform:scale(.97);opacity:.85}
.tap:hover{transform:translateY(-1px)}
.hover-glow:hover{box-shadow:0 0 20px rgba(237,177,255,.12)}

/* Progress */
.bar-track{width:100%;height:6px;background:#353437;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bar-sm .bar-track{height:4px}
.bar-xs .bar-track{height:3px}

/* Badge */
.streak-grad{background:linear-gradient(135deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.xp-badge{background:rgba(110,33,141,.25);color:#edb1ff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px}

/* Status */
.st-hot{background:rgba(255,107,53,.12);color:#ff6b35}
.st-warm{background:rgba(255,215,0,.12);color:#ffd700}
.st-cold{background:rgba(65,105,225,.12);color:#4169e1}
.st-closed{background:rgba(80,200,120,.12);color:#50c878}
.st-active{background:rgba(80,200,120,.12);color:#50c878}
.st-risk{background:rgba(255,107,53,.12);color:#ff6b35}
.st-inactive{background:rgba(152,141,158,.12);color:#988d9e}

/* Tabs */
.tab{display:flex;gap:3px;background:#2a2a2c;border-radius:12px;padding:3px}
.tab>button{flex:1;padding:8px 4px;border-radius:10px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:3px;background:transparent;color:#988d9e}
.tab>button.active{background:linear-gradient(135deg,#edb1ff,#6e218d);color:white}
.tab>button .material-symbols-outlined{font-size:14px}

/* Nav */
#bnav{position:fixed;bottom:0;left:0;right:0;z-index:90;border-top:1px solid rgba(77,67,83,.12)}
#bnav .ni{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 12px;border-radius:10px;border:none;cursor:pointer;background:none;color:#988d9e;transition:all .25s;font-family:'Manrope',sans-serif}
#bnav .ni.act{color:#edb1ff}
#bnav .ni .material-symbols-outlined{font-size:21px}
#bnav .ni span:last-child{font-size:8px;letter-spacing:.04em;font-weight:600}
#bnav .ni .dot{width:18px;height:2.5px;background:#edb1ff;border-radius:2px;margin-top:1px}

/* Header */
#hdr{position:fixed;top:0;left:0;right:0;z-index:90}

/* Page container */
#page{max-width:500px;margin:0 auto;padding:60px 16px 80px}

/* Modal backdrop */
.backdrop{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.backdrop .bg{position:absolute;inset:0;background:rgba(0,0,0,.75)}
.backdrop .panel{position:relative;width:100%;max-width:360px}

/* Inputs */
input[type=text],input[type=search],input[type=number],input[type=tel],input[type=email],textarea,select{background:#2a2a2c;border:none;color:#e5e1e4;outline:none;font-family:'Manrope',sans-serif;border-radius:12px;padding:11px 14px;font-size:13px;width:100%;transition:box-shadow .2s}
input:focus,textarea:focus{box-shadow:0 0 0 1.5px rgba(237,177,255,.3)}
textarea{resize:none}

/* Chips */
.chip{padding:5px 14px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;border:none;cursor:pointer;transition:all .2s}
.chip.active{background:rgba(110,33,141,.25);color:#edb1ff}
.chip:not(.active){background:#2a2a2c;color:#988d9e}

/* Hide utility */
[hidden]{display:none!important}
.vis-hidden{visibility:hidden;position:absolute;pointer-events:none}

/* Responsive */
@media(min-width:640px){#page{padding:70px 24px 90px}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════

  {n:'Lei da Perspectiva',d:'Mostre onde a pessoa estará em 1, 3 e 5 anos se começar agora.',ic:'visibility',ex:'"Imagine daqui a 1 ano ganhando R$5.000 extras por mês..."'},

const AUDIOS=[
  {t:'Mentalidade de Campeão',d:'15:30',done:true},

const REGRAS_OURO=['Seja um produto do produto','Duplique, não complique','Acompanhe sempre os novos','Mantenha o sistema simples'];

const PLANO_1x1=['Conexão Pessoal','Celebrar Vitórias','Revisar Metas','Analisar Números','Pipeline de Leads','Plano de Ação','Compromissos','Encerramento Motivador'];

// ── State (persisted) ──
let S = {
  page:'dashboard', prevPage:null, sub:null,
  user:{
    name:'',xp:0,lv:'Master',streak:0,energy:5,maxEnergy:5,freezes:1,
    contacts:0,sales:0,team:0,step:0,

    {id:'m3',n:'Construtor de Rede',d:'Adicione 10 contatos esta semana',p:0,t:10,xp:200,type:'weekly',active:true},
    {id:'m4',n:'Streak de Fogo',d:'Mantenha 15 dias consecutivos',p:0,t:15,xp:500,type:'achievement',active:true},
  ],
  feed:[],
  notifications:[],
  passoTab:'aprender',
  leaderTab:'semanal',
  leadFilter:'todos',
  teamFilter:'todos',
};

// Load from storage
async function loadState(){
  try{
    const r=await window.storage.get('lt_state');
    if(r&&r.value){
      const saved=JSON.parse(r.value);
      S={...S,...saved,missions:S.missions.map(m=>{
        const sm=saved.missions?.find(x=>x.id===m.id);
        return sm?{...m,...sm}:m;
      })};
    }
  }catch(e){console.log('Fresh start')}
}

async function saveState(){
  try{await window.storage.set('lt_state',JSON.stringify(S))}catch(e){}
}

// ── Toast ──
function toast(msg,type='success'){
  const t=$('#toast');
  const colors={success:'#50c878',error:'#e0115f',xp:'#edb1ff',info:'#4169e1'};
  t.hidden=false;
  t.style.cssText=`position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;color:white;background:${colors[type]||colors.info};box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap`;
  t.textContent=msg;
  setTimeout(()=>{t.hidden=true},2200);
}

function addXP(amount,reason=''){
  S.user.xp+=amount;
  // Check level up
  for(let i=CAREER.length-1;i>=0;i--){
    if(S.user.xp>=CAREER[i].xp){S.user.lv=CAREER[i].lv;break}
  }
  toast(`+${amount} XP${reason?' — '+reason:''}`, 'xp');
  addFeed('Você',`ganhou ${amount} XP${reason?' ('+reason+')':''}`, 'star');
  saveState();
}

function addFeed(user,action,icon='emoji_events'){
  S.feed.unshift({u:user,a:action,ic:icon,t:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),xp:0});
  if(S.feed.length>20)S.feed.pop();
}

function addNotif(msg,type='info'){
  const icons={streak:'local_fire_department',mission:'bolt',league:'military_tech',team:'group',nba:'lightbulb',info:'info',xp:'star'};
  S.notifications.unshift({id:Date.now(),type,msg,time:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),read:false,ic:icons[type]||'info'});
  if(S.notifications.length>30)S.notifications.pop();
}

// ── Navigation ──
function nav(page,sub=null){
  S.prevPage=S.page;
  S.page=page;
  S.sub=sub;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
  saveState();
}

function back(){
  if(S.sub!==null){S.sub=null;render();return}
  if(S.prevPage){S.page=S.prevPage;S.prevPage=null;render();return}
  S.page='dashboard';render();
}

// ── Streak Logic ──
function checkStreak(){
  const today=new Date().toDateString();
  if(S.user.lastActive===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(S.user.lastActive===yesterday){
    S.user.streak++;
    S.user.lastActive=today;
    if(S.user.streak>0&&S.user.streak%5===0)addXP(50,'Streak de '+S.user.streak+' dias!');
    addNotif(`Streak de ${S.user.streak} dias! 🔥`,'streak');
  }else if(S.user.lastActive&&S.user.lastActive!==today){
    if(S.user.streakFreezeActive){
      S.user.streakFreezeActive=false;
      S.user.freezes=Math.max(0,S.user.freezes-1);
      S.user.lastActive=today;
      addNotif('Streak Freeze usado! Seu streak foi protegido.','info');
    }else{
      S.user.streak=1;
      S.user.lastActive=today;
      addNotif('Streak perdido! Comece novamente.','info');
    }
  }else{
    S.user.streak=1;
    S.user.lastActive=today;
  }
  // Update mission
  const sm=S.missions.find(m=>m.id==='m4');
  if(sm)sm.p=Math.min(sm.t,S.user.streak);
  saveState();
}

// ═══════════════════════════════════════
// HEADER
// ═══════════════════════════════════════
function renderHeader(){
  const u=S.user;
  const unread=S.notifications.filter(n=>!n.read).length;
  $('#hdr').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px;height:54px;max-width:500px;margin:0 auto">

function formatTimer(seconds){
  if(!seconds||seconds<=0)return '0:00';
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  return h>0?`${h}h ${m}min`:`${m}min`;
}

window.addLead=function(){
  const name=$('#lead-name')?.value?.trim();
  const phone=$('#lead-phone')?.value?.trim();
  const status=$('#lead-status')?.value||'frio';
  const source=$('#lead-source')?.value||'Lista quente';
  if(!name){toast('Digite o nome do lead','error');return}
  const score=status==='quente'?Math.floor(Math.random()*20)+70:status==='morno'?Math.floor(Math.random()*25)+40:Math.floor(Math.random()*30)+15;
  S.leads.push({id:'l'+Date.now(),name,phone:phone||'',status,source,score,step:'Novo contato',lastContact:'Agora',created:new Date().toISOString()});
  S.user.contacts=S.leads.length;
  addXP(15,'Novo lead: '+name);
  addFeed(S.user.name,`adicionou ${name} à lista`,'person_add');
  // Update mission
  const m3=S.missions.find(m=>m.id==='m3');
  if(m3)m3.p=Math.min(m3.t,m3.p+1);
  saveState();
  render();
}

window.advanceFIR=function(step){
  if(step<FIR_STEPS.length-1){
    S.user.firStep=step+1;
    addXP((step+1)*25,'FIR Etapa '+(step+1));
  }else{
    S.user.fir=true;
    addXP(200,'FIR Completo! 🎉');
    addNotif('FIR completo! Você está pronto para a jornada!','xp');
    toast('FIR Completo! +200 XP 🎉','xp');
    nav('dashboard');
  }
  saveState();render();
}

window.resetApp=async function(){

window.showModal=showModal;

function closeModal(){$('#modals').innerHTML=''}
window.closeModal=closeModal;

window.buyFreeze=function(){
  if(S.user.xp<200){toast('XP insuficiente!','error');closeModal();return}
  S.user.xp-=200;
  S.user.freezes++;
  S.user.streakFreezeActive=true;
  toast('Freeze comprado! (-200 XP)');
  saveState();closeModal();render();
}

window.updateLead=function(id){
  const lead=S.leads.find(l=>l.id===id);
  if(!lead)return;
  const newSt=$('#lead-st-edit')?.value;
  const newStep=$('#lead-step-edit')?.value;
  if(newSt)lead.status=newSt;
  if(newStep)lead.step=newStep;
  if(newSt==='fechado'&&lead.status!=='fechado'){
    S.user.sales++;
    addXP(50,'Venda fechada: '+lead.name);
    addFeed(S.user.name,`fechou venda com ${lead.name}`,'shopping_cart');
  }
  toast('Lead atualizado!');
  saveState();render();
}

window.deleteLead=function(id){
  S.leads=S.leads.filter(l=>l.id!==id);
  S.user.contacts=S.leads.length;
  toast('Lead removido');
  saveState();render();
}

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════
function render(){
  const pages={
    dashboard:renderDashboard,
    journey:renderJourney,
    prospector:renderProspector,
    academy:renderAcademy,
    ranking:renderRanking,
    arena:renderArena,
    leader:renderLeader,
    network:renderNetwork,
    profile:renderProfile,
    fir:renderFIR,
  };

  if(!S.user.onboarded){
    $('#page').innerHTML=renderOnboarding();
    $('#hdr').innerHTML='';
    $('#bnav').innerHTML='';
    return;
  }

  renderHeader();
  renderNav();
  $('#page').innerHTML=(pages[S.page]||pages.dashboard)();
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  await loadState();
  checkStreak();
  render();
  // Show microlearning after 1.5s if onboarded
  if(S.user.onboarded){
    setTimeout(()=>showModal('microlearning'),1500);
  }
  // Timer tick for flash missions
  setInterval(()=>{
    S.missions.forEach(m=>{
      if(m.type==='flash'&&m.timer>0)m.timer-=60;
    });
  },60000);
}

init();
</script>
