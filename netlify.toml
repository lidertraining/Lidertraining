[build]
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

# SPA fallback: qualquer rota desconhecida volta para index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache agressivo para assets com hash
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
